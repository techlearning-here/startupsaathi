# Render Blueprint — single file at repo root (monorepo: backend via rootDir).
# Backend runs from backend/; see docs/lean_mvp/DEPLOY_VERCEL_RENDER.md.
services:
  - type: web
    name: startupsaathi-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
